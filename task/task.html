<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="task.css">
</head>
<body>

    <div id="notificationToasts"></div>

    <!-- 💬 MESSAGE -->
    <div id="messageBox"></div>

    <!-- 📱 MOBILE MENU BUTTON -->
    <button id="menuToggle" type="button">☰</button>

    <!-- 🧱 APP LAYOUT -->
    <div id="app">

        <!-- 🔔 SIDEBAR -->
        <aside id="sidebar">
            <h3>🔔 Notifications (<span id="notifCount">0</span>)</h3>
            <div id="notifList"></div>
        </aside>

        <!-- ✅ MAIN CONTENT -->
        <main id="main">

            <div id="TaskManager">
                <div class="header">
                    <h1>Task Manager</h1>
                    <div class="menu-container">
                        <button id="createButton" type="button">New</button>
                        <button id="savedTasks" type="button">Saved</button>
                    </div>
                </div>

                <div id="taskList"></div>

            </div>

        </main>

    </div>

    <!-- 🔌 SCRIPTS -->
    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
    <script type="module" src="main.js"></script>

</body>
</html>
